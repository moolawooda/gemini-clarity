<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 16px;
    }
    .header {
      text-align: center;
      margin-bottom: 16px;
    }
    .emoji {
      font-size: 48px;
      line-height: 1.2;
    }
    .status-label {
      font-size: 14px;
      color: #aaa;
      margin-top: 4px;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      margin: 12px 0;
      background: linear-gradient(to right,
        rgba(76,175,80,0.2) 0%, rgba(76,175,80,0.2) 25%,
        rgba(255,152,0,0.2) 25%, rgba(255,152,0,0.2) 50%,
        rgba(244,67,54,0.2) 50%, rgba(244,67,54,0.2) 75%,
        rgba(156,39,176,0.2) 75%, rgba(156,39,176,0.2) 100%
      );
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
      background: linear-gradient(to right,
        #4CAF50 0%, #4CAF50 25%,
        #FF9800 25%, #FF9800 50%,
        #F44336 50%, #F44336 75%,
        #9C27B0 75%, #9C27B0 100%
      );
      background-size: 100% 100%;
    }
    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #ccc;
    }
    .stats .value {
      font-weight: 600;
      color: #fff;
    }
    .advice {
      margin-top: 12px;
      padding: 10px;
      background: #16213e;
      border-radius: 8px;
      font-size: 12px;
      color: #aaa;
      line-height: 1.5;
    }
    .no-data {
      text-align: center;
      padding: 20px 0;
      color: #666;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="content" class="no-data">
    Open Gemini to start monitoring
  </div>
  <script src="popup.js"></script>
</body>
</html>
